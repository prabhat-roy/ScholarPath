# NATS JetStream is the bus for live virtual-classroom signalling.
# Sub-second delivery for join/leave/whiteboard/poll events; persisted streams
# allow late joiners to catch up to the latest classroom state.
apiVersion: nats.io/v1alpha2
kind: NatsCluster
metadata: { name: scholarpath-nats, namespace: messaging }
spec:
  size: 3
  natsConfig:
    jetstream:
      enabled: true
      memStorage:  { enabled: true, size: 4Gi }
      fileStorage: { enabled: true, size: 200Gi, storageClassName: gp3 }
