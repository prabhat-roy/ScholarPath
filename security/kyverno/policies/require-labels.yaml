apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata: { name: require-scholarpath-labels }
spec:
  validationFailureAction: Enforce
  rules:
    - name: check-required-labels
      match:
        any: [{ resources: { kinds: [Deployment, StatefulSet] } }]
      validate:
        message: "missing required labels: app.kubernetes.io/name, scholarpath.io/domain"
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"
              scholarpath.io/domain: "?*"
