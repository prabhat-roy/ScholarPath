# Apache Polaris — Iceberg REST catalog with RBAC + multi-engine support
image: { repository: apache/polaris, tag: latest }
polaris:
  realm: scholarpath
  storage:
    s3: { endpoint: http://minio.scholarpath.svc:9000, region: us-east-1, bucket: scholarpath-iceberg-warehouse }
ingress: { enabled: true, hosts: [{ host: polaris.scholarpath.internal }] }
