apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata: { name: scholarpath-xapi-aggregator, namespace: streaming }
spec:
  image: flink:1.20
  flinkVersion: v1_20
  jobManager: { resource: { memory: "2Gi", cpu: 1 } }
  taskManager: { resource: { memory: "4Gi", cpu: 2 } }
  job:
    jarURI: local:///opt/scholarpath/flink-jobs.jar
    entryClass: io.scholarpath.streaming.XApiEngagementAggregator
    args: ["--bootstrap","kafka.messaging:9092","--clickhouse","clickhouse.analytics:8123"]
