apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: scholarpath-anomaly-detection, namespace: scholarpath }
spec:
  deploymentName: scholarpath-flink
  job:
    jarURI: s3://scholarpath-flink-jobs/anomaly-detection.jar
    parallelism: 6
    upgradeMode: savepoint
    args: ["--source-topic", "scholarpath.metrics.raw", "--sink-topic", "scholarpath.alerts.anomaly"]
