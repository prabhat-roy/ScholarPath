apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: scholarpath-event-enrichment, namespace: scholarpath }
spec:
  deploymentName: scholarpath-flink
  job:
    jarURI: s3://scholarpath-flink-jobs/event-enrichment.jar
    parallelism: 4
    upgradeMode: savepoint
    args: ["--source-topic", "scholarpath.cdc.public.events", "--sink-topic", "scholarpath.events.enriched"]
