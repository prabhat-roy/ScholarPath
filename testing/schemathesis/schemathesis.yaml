apiVersion: batch/v1
kind: CronJob
metadata: { name: schemathesis, namespace: scholarpath-testing }
spec:
  schedule: "0 6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: schemathesis
              image: schemathesis/schemathesis:stable
              args:
                - run
                - https://api.scholarpath.com/openapi.json
                - --checks=all
                - --hypothesis-deadline=10000
