apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-exam-service
  labels: { app.kubernetes.io/name: exam-service, scholarpath.io/domain: assessment }
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-exam-service
  labels: { app.kubernetes.io/name: exam-service, scholarpath.io/domain: assessment }
spec:
  type: {{ .Values.service.type }}
  ports: [{ port: {{ .Values.service.port }}, targetPort: http, name: http }]
  selector: { app.kubernetes.io/name: exam-service }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-exam-service
  labels: { app.kubernetes.io/name: exam-service, app.kubernetes.io/part-of: scholarpath, scholarpath.io/domain: assessment }
spec:
  replicas: {{ .Values.replicaCount }}
  selector: { matchLabels: { app.kubernetes.io/name: exam-service } }
  template:
    metadata: { labels: { app.kubernetes.io/name: exam-service, scholarpath.io/domain: assessment } }
    spec:
      serviceAccountName: {{ .Release.Name }}-exam-service
      securityContext: {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: exam-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          ports: [{ name: http, containerPort: {{ .Values.service.targetPort }} }]
          env:
            - { name: PORT, value: "{{ .Values.service.targetPort }}" }
            {{- range $k, $v := .Values.config }}
            - { name: {{ $k }}, value: "{{ $v }}" }
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom: {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe: {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe: {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
