image: { repository: scholarpath/exam-service, tag: "", pullPolicy: IfNotPresent }
replicaCount: 3
service: { type: ClusterIP, port: 50600, targetPort: 50600 }
resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1500m, memory: 1Gi } }
probes: { liveness: { httpGet: { path: /healthz, port: 50600 } }, readiness: { httpGet: { path: /healthz, port: 50600 } } }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: exam-service, app.kubernetes.io/part-of: scholarpath, scholarpath.io/domain: assessment }
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info }
cloud: { provider: "" }
