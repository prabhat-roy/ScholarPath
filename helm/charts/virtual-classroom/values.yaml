image: { repository: scholarpath/virtual-classroom, tag: "", pullPolicy: IfNotPresent }
replicaCount: 3
service: { type: ClusterIP, port: 50400, targetPort: 50400 }
resources: { requests: { cpu: 500m, memory: 512Mi }, limits: { cpu: 2000m, memory: 2Gi } }
probes: { liveness: { httpGet: { path: /healthz, port: 50400 } }, readiness: { httpGet: { path: /healthz, port: 50400 } } }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: virtual-classroom, app.kubernetes.io/part-of: scholarpath, scholarpath.io/domain: classroom }
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info, NATS_URL: "nats://nats.messaging:4222" }
cloud: { provider: "" }
