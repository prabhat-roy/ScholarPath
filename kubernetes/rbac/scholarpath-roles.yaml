---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: scholarpath-service-reader }
rules:
  - apiGroups: [""]
    resources: [pods, services, configmaps]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: scholarpath-platform-admin }
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
# Teachers can read student progress data inside their courses; FERPA enforced at app layer.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: scholarpath-grader }
rules:
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list]
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [get, list, watch]
