# Skaffold pipeline for ScholarPath
apiVersion: skaffold/v4beta11
kind: Config
metadata: { name: scholarpath }
build:
  artifacts:
    - { image: scholarpath/api-gateway, context: src/api-gateway }
    - { image: scholarpath/identity-service, context: src/identity-service }
  local: { push: false }
deploy:
  helm:
    releases:
      - { name: api-gateway, chartPath: helm/charts/api-gateway, namespace: scholarpath }
profiles:
  - name: prod
    deploy: { kubectl: { manifests: ["manifests/prod/*.yaml"] } }
