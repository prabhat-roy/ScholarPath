syntax = "proto3";

package scholarpath.compliance.v1;

import "google/protobuf/timestamp.proto";

option java_package = "io.scholarpath.compliance.v1";
option java_multiple_files = true;

// safeguarding-alerts: Detects + escalates child safeguarding signals
// (self-harm language, grooming patterns) to trained safeguarding staff.
service SafeguardingAlertsService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
