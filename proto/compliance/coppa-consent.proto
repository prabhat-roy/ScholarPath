syntax = "proto3";

package scholarpath.compliance.v1;

import "google/protobuf/timestamp.proto";

option java_package = "io.scholarpath.compliance.v1";
option java_multiple_files = true;

// coppa-consent: COPPA parental consent orchestration for under-13 learners.
service CoppaConsentService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
