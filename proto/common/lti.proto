syntax = "proto3";

package scholarpath.common.v1;

// LtiLaunch is a normalised representation of an IMS LTI 1.3 launch.
// Every LTI integration (tools / consumers) speaks LtiLaunch over the wire.
message LtiLaunch {
  // The platform-issued JWT (id_token).
  string id_token = 1;

  // LTI 1.3 deployment_id from the platform.
  string deployment_id = 2;

  // OIDC issuer URL of the originating platform.
  string issuer = 3;

  // Audience (the tool's client_id).
  string audience = 4;

  // Resource link claim - identifies the activity being launched.
  string resource_link_id = 5;

  // Roles claim - urn:lti:role:ims/lis/Learner | Instructor | Mentor.
  repeated string roles = 6;
}
