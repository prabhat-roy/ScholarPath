syntax = "proto3";

package scholarpath.library.v1;

import "google/protobuf/timestamp.proto";

option java_package = "io.scholarpath.library.v1";
option java_multiple_files = true;

// digital-library: Catalogue + search across resources / e-books / journals.
service DigitalLibraryService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
