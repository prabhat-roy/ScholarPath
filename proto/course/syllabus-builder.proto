syntax = "proto3";

package scholarpath.course.v1;

import "google/protobuf/timestamp.proto";

option java_package = "io.scholarpath.course.v1";
option java_multiple_files = true;

// syllabus-builder: Syllabus authoring, versioning, accessibility checks.
service SyllabusBuilderService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
