syntax = "proto3";

package scholarpath.classroom.v1;

import "google/protobuf/timestamp.proto";

option java_package = "io.scholarpath.classroom.v1";
option java_multiple_files = true;

// virtual-classroom: Live class signalling on top of MediaSoup SFU + Jitsi.
// Signalling is delivered over NATS JetStream, NOT Kafka, for sub-second pipe latency.
service VirtualClassroomService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
