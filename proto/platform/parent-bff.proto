syntax = "proto3";

package scholarpath.platform.v1;

import "google/protobuf/timestamp.proto";

option java_package = "io.scholarpath.platform.v1";
option java_multiple_files = true;

// parent-bff: BFF for the parent portal (engagement, progress, payments).
service ParentBffService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
