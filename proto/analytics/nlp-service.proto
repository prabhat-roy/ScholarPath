syntax = "proto3";

package scholarpath.analytics.v1;

import "google/protobuf/timestamp.proto";

option java_package = "io.scholarpath.analytics.v1";
option java_multiple_files = true;

// nlp-service: BERT-based essay scoring + topic / sentiment extraction.
service NlpService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
