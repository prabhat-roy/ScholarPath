syntax = "proto3";

package scholarpath.assessment.v1;

import "google/protobuf/timestamp.proto";

option java_package = "io.scholarpath.assessment.v1";
option java_multiple_files = true;

// qti-parser: IMS QTI 2.2 import / export and item-bank normalisation.
service QtiParserService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
