syntax = "proto3";

package scholarpath.assessment.v1;

import "google/protobuf/timestamp.proto";

option java_package = "io.scholarpath.assessment.v1";
option java_multiple_files = true;

// grading-service: Auto-grading + NLP-assisted essay scoring.
// Every grade override produces an audit record with grader identity + reason.
service GradingService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
