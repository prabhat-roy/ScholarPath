syntax = "proto3";

package scholarpath.assessment.v1;

import "google/protobuf/timestamp.proto";

option java_package = "io.scholarpath.assessment.v1";
option java_multiple_files = true;

// proctoring-service: On-prem AI proctoring (face / eye tracking). Raw video
// is deleted after the exam window; only flagged events are persisted.
service ProctoringService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
