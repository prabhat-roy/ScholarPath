syntax = "proto3";

package scholarpath.identity.v1;

import "google/protobuf/timestamp.proto";

option java_package = "io.scholarpath.identity.v1";
option java_multiple_files = true;

// auth-service: Keycloak-fronted OAuth2/OIDC provider for ScholarPath.
service AuthService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
