syntax = "proto3";

package scholarpath.identity.v1;

import "google/protobuf/timestamp.proto";

option java_package = "io.scholarpath.identity.v1";
option java_multiple_files = true;

// student-sso: SSO bridge for students (Google Classroom / Microsoft 365 federation).
service StudentSsoService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
