# Flux uses HelmReleases generated by an external tool; one HelmRelease per service.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata: { name: scholarpath-platform, namespace: scholarpath }
spec:
  interval: 5m
  chart:
    spec:
      chart: helm/charts/api-gateway
      sourceRef: { kind: GitRepository, name: scholarpath, namespace: flux-system }
  valuesFrom:
    - kind: ConfigMap
      name: scholarpath-cloud-overlay
      valuesKey: cloud-values.yaml
