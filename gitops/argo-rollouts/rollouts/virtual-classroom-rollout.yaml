apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: virtual-classroom, namespace: scholarpath }
spec:
  replicas: 3
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 10m }   # longer soak - live audio/video latency
        - analysis:
            templates: [{ templateName: scholarpath-canary-analysis }]
            args: [{ name: service-name, value: virtual-classroom }]
        - setWeight: 50
        - pause: { duration: 10m }
        - setWeight: 100
  selector: { matchLabels: { app.kubernetes.io/name: virtual-classroom } }
  template:
    metadata: { labels: { app.kubernetes.io/name: virtual-classroom } }
    spec:
      nodeSelector: { "scholarpath.io/workload": "live-classroom" }
      tolerations:
        - key: scholarpath.io/workload
          operator: Equal
          value: live-classroom
          effect: NoSchedule
      containers:
        - name: virtual-classroom
          image: harbor.scholarpath.internal/scholarpath/virtual-classroom:0.1.0
          ports: [{ containerPort: 50400 }]
