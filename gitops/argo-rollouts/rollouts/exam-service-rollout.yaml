# Exam grading uses BLUE/GREEN during exam windows - never canary mid-exam.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: exam-service, namespace: scholarpath }
spec:
  replicas: 4
  strategy:
    blueGreen:
      activeService: exam-service-active
      previewService: exam-service-preview
      autoPromotionEnabled: false
      prePromotionAnalysis:
        templates: [{ templateName: scholarpath-canary-analysis }]
        args: [{ name: service-name, value: exam-service }]
  selector: { matchLabels: { app.kubernetes.io/name: exam-service } }
  template:
    metadata: { labels: { app.kubernetes.io/name: exam-service } }
    spec:
      containers:
        - name: exam-service
          image: harbor.scholarpath.internal/scholarpath/exam-service:0.1.0
          ports: [{ containerPort: 50600 }]
