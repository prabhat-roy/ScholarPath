apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-library
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: digital-library
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: library
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: digital-library } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: digital-library, scholarpath.io/domain: library }
    spec:
      serviceAccountName: digital-library
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: digital-library
          image: harbor.scholarpath.internal/scholarpath/digital-library:latest
          ports: [{ containerPort: 50220, name: http }]
          envFrom: [{ configMapRef: { name: digital-library } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50220 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50220 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
