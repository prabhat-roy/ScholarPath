apiVersion: apps/v1
kind: Deployment
metadata:
  name: early-intervention
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: early-intervention
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: early-intervention } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: early-intervention, scholarpath.io/domain: analytics }
    spec:
      serviceAccountName: early-intervention
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: early-intervention
          image: harbor.scholarpath.internal/scholarpath/early-intervention:latest
          ports: [{ containerPort: 50261, name: http }]
          envFrom: [{ configMapRef: { name: early-intervention } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
