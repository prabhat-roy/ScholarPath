apiVersion: apps/v1
kind: Deployment
metadata:
  name: breakout-rooms
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: breakout-rooms
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: classroom
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: breakout-rooms } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: breakout-rooms, scholarpath.io/domain: classroom }
    spec:
      serviceAccountName: breakout-rooms
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: breakout-rooms
          image: harbor.scholarpath.internal/scholarpath/breakout-rooms:latest
          ports: [{ containerPort: 50080, name: http }]
          envFrom: [{ configMapRef: { name: breakout-rooms } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50080 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50080 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
