apiVersion: apps/v1
kind: Deployment
metadata:
  name: virtual-classroom
  namespace: scholarpath
  labels: { app.kubernetes.io/name: virtual-classroom, app.kubernetes.io/part-of: scholarpath, scholarpath.io/domain: classroom }
spec:
  replicas: 3
  selector: { matchLabels: { app.kubernetes.io/name: virtual-classroom } }
  template:
    metadata: { labels: { app.kubernetes.io/name: virtual-classroom, scholarpath.io/domain: classroom } }
    spec:
      nodeSelector: { "scholarpath.io/workload": "live-classroom" }
      tolerations:
        - { key: scholarpath.io/workload, operator: Equal, value: live-classroom, effect: NoSchedule }
      serviceAccountName: virtual-classroom
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: virtual-classroom
          image: harbor.scholarpath.internal/scholarpath/virtual-classroom:latest
          ports:
            - { containerPort: 50400, name: http }
            - { containerPort: 40000, name: rtp,  protocol: UDP }
          envFrom: [{ configMapRef: { name: virtual-classroom } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50400 }, initialDelaySeconds: 30 }
          readinessProbe: { httpGet: { path: /healthz, port: 50400 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 500m, memory: 512Mi }
            limits:   { cpu: 2000m, memory: 2Gi }
