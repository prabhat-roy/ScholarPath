apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: scholarpath
  labels: { app.kubernetes.io/name: auth-service, app.kubernetes.io/part-of: scholarpath, scholarpath.io/domain: identity }
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: auth-service } }
  template:
    metadata: { labels: { app.kubernetes.io/name: auth-service, scholarpath.io/domain: identity } }
    spec:
      serviceAccountName: auth-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: auth-service
          image: harbor.scholarpath.internal/scholarpath/auth-service:latest
          ports: [{ containerPort: 50100, name: http }]
          envFrom: [{ configMapRef: { name: auth-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50100 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50100 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
