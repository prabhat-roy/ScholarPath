apiVersion: apps/v1
kind: Deployment
metadata:
  name: lti-provider
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: lti-provider
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: identity
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: lti-provider } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: lti-provider, scholarpath.io/domain: identity }
    spec:
      serviceAccountName: lti-provider
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: lti-provider
          image: harbor.scholarpath.internal/scholarpath/lti-provider:latest
          ports: [{ containerPort: 50023, name: http }]
          envFrom: [{ configMapRef: { name: lti-provider } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50023 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50023 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
