apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-sso
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: student-sso
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: identity
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: student-sso } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: student-sso, scholarpath.io/domain: identity }
    spec:
      serviceAccountName: student-sso
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: student-sso
          image: harbor.scholarpath.internal/scholarpath/student-sso:latest
          ports: [{ containerPort: 50021, name: http }]
          envFrom: [{ configMapRef: { name: student-sso } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50021 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50021 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
