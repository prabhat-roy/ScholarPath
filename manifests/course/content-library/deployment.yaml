apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-library
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: content-library
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: course
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: content-library } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: content-library, scholarpath.io/domain: course }
    spec:
      serviceAccountName: content-library
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: content-library
          image: harbor.scholarpath.internal/scholarpath/content-library:latest
          ports: [{ containerPort: 50061, name: http }]
          envFrom: [{ configMapRef: { name: content-library } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50061 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50061 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
