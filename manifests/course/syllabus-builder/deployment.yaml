apiVersion: apps/v1
kind: Deployment
metadata:
  name: syllabus-builder
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: syllabus-builder
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: course
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: syllabus-builder } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: syllabus-builder, scholarpath.io/domain: course }
    spec:
      serviceAccountName: syllabus-builder
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: syllabus-builder
          image: harbor.scholarpath.internal/scholarpath/syllabus-builder:latest
          ports: [{ containerPort: 50062, name: http }]
          envFrom: [{ configMapRef: { name: syllabus-builder } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50062 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50062 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
