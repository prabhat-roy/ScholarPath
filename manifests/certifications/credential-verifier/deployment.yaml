apiVersion: apps/v1
kind: Deployment
metadata:
  name: credential-verifier
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: credential-verifier
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: certifications
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: credential-verifier } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: credential-verifier, scholarpath.io/domain: certifications }
    spec:
      serviceAccountName: credential-verifier
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: credential-verifier
          image: harbor.scholarpath.internal/scholarpath/credential-verifier:latest
          ports: [{ containerPort: 50141, name: http }]
          envFrom: [{ configMapRef: { name: credential-verifier } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50141 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50141 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
