apiVersion: apps/v1
kind: Deployment
metadata:
  name: performance-review
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: performance-review
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: staff
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: performance-review } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: performance-review, scholarpath.io/domain: staff }
    spec:
      serviceAccountName: performance-review
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: performance-review
          image: harbor.scholarpath.internal/scholarpath/performance-review:latest
          ports: [{ containerPort: 50242, name: http }]
          envFrom: [{ configMapRef: { name: performance-review } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50242 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50242 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
