apiVersion: apps/v1
kind: Deployment
metadata:
  name: adaptive-learning
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: adaptive-learning
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: progress
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: adaptive-learning } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: adaptive-learning, scholarpath.io/domain: progress }
    spec:
      serviceAccountName: adaptive-learning
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: adaptive-learning
          image: harbor.scholarpath.internal/scholarpath/adaptive-learning:latest
          ports: [{ containerPort: 50163, name: http }]
          envFrom: [{ configMapRef: { name: adaptive-learning } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50163 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50163 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
