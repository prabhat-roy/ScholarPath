apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-verification
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: document-verification
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: enrolment
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: document-verification } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: document-verification, scholarpath.io/domain: enrolment }
    spec:
      serviceAccountName: document-verification
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: document-verification
          image: harbor.scholarpath.internal/scholarpath/document-verification:latest
          ports: [{ containerPort: 50042, name: http }]
          envFrom: [{ configMapRef: { name: document-verification } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50042 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50042 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
