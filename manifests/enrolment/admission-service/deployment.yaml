apiVersion: apps/v1
kind: Deployment
metadata:
  name: admission-service
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: admission-service
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: enrolment
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: admission-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: admission-service, scholarpath.io/domain: enrolment }
    spec:
      serviceAccountName: admission-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: admission-service
          image: harbor.scholarpath.internal/scholarpath/admission-service:latest
          ports: [{ containerPort: 50040, name: http }]
          envFrom: [{ configMapRef: { name: admission-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50040 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50040 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
