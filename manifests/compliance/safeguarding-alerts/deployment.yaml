apiVersion: apps/v1
kind: Deployment
metadata:
  name: safeguarding-alerts
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: safeguarding-alerts
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: compliance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: safeguarding-alerts } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: safeguarding-alerts, scholarpath.io/domain: compliance }
    spec:
      serviceAccountName: safeguarding-alerts
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: safeguarding-alerts
          image: harbor.scholarpath.internal/scholarpath/safeguarding-alerts:latest
          ports: [{ containerPort: 50283, name: http }]
          envFrom: [{ configMapRef: { name: safeguarding-alerts } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50283 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50283 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
