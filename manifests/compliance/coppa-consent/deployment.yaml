apiVersion: apps/v1
kind: Deployment
metadata:
  name: coppa-consent
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: coppa-consent
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: compliance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: coppa-consent } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: coppa-consent, scholarpath.io/domain: compliance }
    spec:
      serviceAccountName: coppa-consent
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: coppa-consent
          image: harbor.scholarpath.internal/scholarpath/coppa-consent:latest
          ports: [{ containerPort: 50281, name: http }]
          envFrom: [{ configMapRef: { name: coppa-consent } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50281 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50281 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
