apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-retention
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: data-retention
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: compliance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: data-retention } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: data-retention, scholarpath.io/domain: compliance }
    spec:
      serviceAccountName: data-retention
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: data-retention
          image: harbor.scholarpath.internal/scholarpath/data-retention:latest
          ports: [{ containerPort: 50282, name: http }]
          envFrom: [{ configMapRef: { name: data-retention } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50282 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50282 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
