apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: lms-service, namespace: scholarpath }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: lms-service }
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
