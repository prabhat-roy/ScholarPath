apiVersion: apps/v1
kind: Deployment
metadata:
  name: anti-cheat
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: anti-cheat
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: assessment
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: anti-cheat } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: anti-cheat, scholarpath.io/domain: assessment }
    spec:
      serviceAccountName: anti-cheat
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: anti-cheat
          image: harbor.scholarpath.internal/scholarpath/anti-cheat:latest
          ports: [{ containerPort: 50124, name: http }]
          envFrom: [{ configMapRef: { name: anti-cheat } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50124 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50124 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
