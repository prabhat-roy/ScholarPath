apiVersion: apps/v1
kind: Deployment
metadata:
  name: qti-parser
  namespace: scholarpath
  labels:
    app.kubernetes.io/name: qti-parser
    app.kubernetes.io/part-of: scholarpath
    scholarpath.io/domain: assessment
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: qti-parser } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: qti-parser, scholarpath.io/domain: assessment }
    spec:
      serviceAccountName: qti-parser
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: qti-parser
          image: harbor.scholarpath.internal/scholarpath/qti-parser:latest
          ports: [{ containerPort: 50122, name: http }]
          envFrom: [{ configMapRef: { name: qti-parser } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50122 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50122 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
