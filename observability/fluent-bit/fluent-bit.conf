[SERVICE]
    Daemon Off
    HTTP_Server On
    HTTP_Port 2020
    Parsers_File parsers.conf

[INPUT]
    Name tail
    Path /var/log/containers/*scholarpath*.log
    Parser docker
    Tag kube.*
    Refresh_Interval 5

[FILTER]
    Name modify
    Match *
    Add cluster scholarpath

# FERPA / COPPA: never let raw student PII reach Loki - mask aggressively at collection.
[FILTER]
    Name modify
    Match *
    Rename student_id      student_id_redacted
    Rename student_email   student_email_redacted
    Rename parent_email    parent_email_redacted
    Rename national_id     national_id_redacted

[OUTPUT]
    Name loki
    Match kube.*
    host loki
    port 3100
    labels job=scholarpath, app=$kubernetes['labels']['app.kubernetes.io/name']
