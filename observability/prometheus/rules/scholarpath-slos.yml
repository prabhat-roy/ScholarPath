groups:
  - name: scholarpath-slo-burn
    rules:
      - alert: ScholarPathErrorBudgetBurn
        expr: |
          (
            sum(rate(http_requests_total{namespace="scholarpath",status=~"5.."}[5m])) by (app)
            /
            sum(rate(http_requests_total{namespace="scholarpath"}[5m])) by (app)
          ) > 0.01
        for: 5m
        labels: { severity: critical, team: '{{ $labels.app }}' }
        annotations: { summary: "Error rate >1% for {{ $labels.app }}" }

      - alert: ScholarPathLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum by (app, le) (rate(http_request_duration_seconds_bucket{namespace="scholarpath"}[5m]))
          ) > 1
        for: 10m
        labels: { severity: warning }
        annotations: { summary: "p99 latency >1s for {{ $labels.app }}" }
