---
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata: { name: api-gateway-availability, namespace: observability }
spec:
  target: '99.95'
  window: 4w
  indicator:
    ratio:
      errors: { metric: http_requests_total{app="api-gateway",status=~"5.."} }
      total:  { metric: http_requests_total{app="api-gateway"} }
---
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata: { name: lms-service-availability, namespace: observability }
spec:
  target: '99.9'
  window: 4w
  indicator:
    ratio:
      errors: { metric: http_requests_total{app="lms-service",status=~"5.."} }
      total:  { metric: http_requests_total{app="lms-service"} }
---
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata: { name: exam-service-availability, namespace: observability }
spec:
  # Higher target during exam windows; managed via blue-green during exams.
  target: '99.99'
  window: 4w
  indicator:
    ratio:
      errors: { metric: http_requests_total{app="exam-service",status=~"5.."} }
      total:  { metric: http_requests_total{app="exam-service"} }
